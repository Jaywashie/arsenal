<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arsenal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; color: #f0ece4; background: #0d0d0d; }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 0.5px solid #2a2a2a;
    position: sticky; top: 0;
    background: rgba(13,13,13,0.9);
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  .logo { font-family: Georgia, serif; font-size: 1.2rem; color: #c8a96e; text-decoration: none; }
  .nav-links { display: flex; gap: 1.5rem; list-style: none; }
  .nav-links a { font-size: 0.82rem; text-decoration: none; color: #7a7570; text-transform: uppercase; letter-spacing: 0.08em; }
  .nav-links a:hover { color: #f0ece4; }

  .hero {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 4rem 2rem;
    gap: 1rem;
  }
  .hero h1 { font-family: Georgia, serif; font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1.15; }
  .hero h1 em { color: #c8a96e; font-style: italic; }
  .hero p { color: #7a7570; font-size: 1rem; }
  .hero a {
    margin-top: 0.5rem;
    padding: 0.65rem 1.75rem;
    background: #c8a96e;
    color: #0d0d0d;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
  }
  .hero a:hover { background: #dbbe88; }

  .stats {
    display: flex;
    justify-content: center;
    gap: 3rem;
    padding: 1.5rem 2rem 2.5rem;
    border-top: 0.5px solid #2a2a2a;
    margin: 0 2rem;
  }
  .stat-num { font-family: Georgia, serif; font-size: 1.8rem; color: #c8a96e; }
  .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #7a7570; }

  section { padding: 3rem 2rem; background: #161616; }
  section h2 { font-family: Georgia, serif; font-size: 1.8rem; margin-bottom: 1.5rem; }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 180px);
    gap: 8px;
  }
  .g1 { grid-column: 1 / 3; grid-row: 1 / 3; }
  .g2 { grid-column: 3;     grid-row: 1; }
  .g3 { grid-column: 3;     grid-row: 2; }

  .tile {
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .tile .fill { width: 100%; height: 100%; transition: transform 0.3s ease; }
  .tile:hover .fill { transform: scale(1.04); }
  .tile .caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0.6rem 0.8rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: #fff;
    font-size: 0.78rem;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tile:hover .caption { opacity: 1; }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
  .tile:hover img { transform: scale(1.04); }

  footer {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 2rem;
    padding: 2rem;
    border-top: 0.5px solid #2a2a2a;
    font-size: 0.85rem;
    color: #7a7570;
    background: #161616;
  }
  footer h4 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; color: #7a7570; }
  footer ul { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
  footer a { color: #f0ece4; text-decoration: none; }
  footer a:hover { color: #c8a96e; }

  @media (max-width: 600px) {
    .nav-links { display: none; }
    .gallery-grid {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 150px 150px;
    }
    .g1 { grid-column: 1 / 3; grid-row: 1; }
    .g2 { grid-column: 1;     grid-row: 2; }
    .g3 { grid-column: 2;     grid-row: 2; }
    .stats { gap: 1.5rem; }
    footer { flex-direction: column; }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">ARSENAL</a>
  <ul class="nav-links">
    <li><a href="#gallery">Gallery</a></li>
   
  </ul>
</nav>

<div class="hero">
  <h1>Best club <br>in the <em>World</em></h1>
  <a href="#gallery">Explore Gallery</a>
</div>


<section id="gallery">
  <h2>Gallery</h2>
  <div class="gallery-grid">
    <div class="tile g1">
      <img src="arsenal2.jpg" alt="Photo 1" />
      <div class="caption">PREMIER LEAGUE CHAMPIONS</div>
    </div>
    <div class="tile g2">
      <img src="arsenal1.jpg" alt="Photo 2" />
      <div class="caption">BEST WINGER</div>
    </div>
    <div class="tile g3">
      <img src="arsenal3.jpg " alt="Photo 3" />
      <div class="caption">WALL</div>
    </div>
  </div>
</section>

<footer>
  <div>
    <h4>Navigate</h4>
    <ul>
      <li><a href="#gallery">Gallery</a></li>
    </ul>
  </div>
  <div>
    <h4>Contact</h4>
    <ul>
      <li><a href="mailto:jaywashie5735@gmail.com">jaywashie5735@gmail.com</a></li>
    </ul>
  </div>
</footer>

</body>
</html>
